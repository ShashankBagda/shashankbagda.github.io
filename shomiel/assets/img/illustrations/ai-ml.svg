<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160">
  <title>AI and Machine Learning</title>

  <!-- Connection lines first (behind nodes) -->
  <!-- Input to hidden -->
  <line x1="40" y1="40" x2="90" y2="35" stroke="#EFC14F" stroke-width="0.8" opacity="0.3"/>
  <line x1="40" y1="40" x2="90" y2="65" stroke="#EFC14F" stroke-width="0.8" opacity="0.3"/>
  <line x1="40" y1="40" x2="90" y2="95" stroke="#EFC14F" stroke-width="0.8" opacity="0.2"/>

  <line x1="40" y1="80" x2="90" y2="35" stroke="#EFC14F" stroke-width="0.8" opacity="0.3"/>
  <line x1="40" y1="80" x2="90" y2="65" stroke="#EFC14F" stroke-width="0.8" opacity="0.4"/>
  <line x1="40" y1="80" x2="90" y2="95" stroke="#EFC14F" stroke-width="0.8" opacity="0.3"/>
  <line x1="40" y1="80" x2="90" y2="125" stroke="#EFC14F" stroke-width="0.8" opacity="0.2"/>

  <line x1="40" y1="120" x2="90" y2="65" stroke="#EFC14F" stroke-width="0.8" opacity="0.2"/>
  <line x1="40" y1="120" x2="90" y2="95" stroke="#EFC14F" stroke-width="0.8" opacity="0.3"/>
  <line x1="40" y1="120" x2="90" y2="125" stroke="#EFC14F" stroke-width="0.8" opacity="0.4"/>

  <!-- Hidden to hidden 2 -->
  <line x1="90" y1="35" x2="140" y2="50" stroke="#EFC14F" stroke-width="0.8" opacity="0.35"/>
  <line x1="90" y1="35" x2="140" y2="80" stroke="#EFC14F" stroke-width="0.8" opacity="0.25"/>
  <line x1="90" y1="65" x2="140" y2="50" stroke="#EFC14F" stroke-width="0.8" opacity="0.35"/>
  <line x1="90" y1="65" x2="140" y2="80" stroke="#EFC14F" stroke-width="0.8" opacity="0.4"/>
  <line x1="90" y1="65" x2="140" y2="110" stroke="#EFC14F" stroke-width="0.8" opacity="0.2"/>
  <line x1="90" y1="95" x2="140" y2="50" stroke="#EFC14F" stroke-width="0.8" opacity="0.2"/>
  <line x1="90" y1="95" x2="140" y2="80" stroke="#EFC14F" stroke-width="0.8" opacity="0.35"/>
  <line x1="90" y1="95" x2="140" y2="110" stroke="#EFC14F" stroke-width="0.8" opacity="0.4"/>
  <line x1="90" y1="125" x2="140" y2="80" stroke="#EFC14F" stroke-width="0.8" opacity="0.25"/>
  <line x1="90" y1="125" x2="140" y2="110" stroke="#EFC14F" stroke-width="0.8" opacity="0.35"/>

  <!-- Hidden 2 to output -->
  <line x1="140" y1="50" x2="180" y2="60" stroke="#EFC14F" stroke-width="1" opacity="0.4"/>
  <line x1="140" y1="50" x2="180" y2="100" stroke="#EFC14F" stroke-width="0.8" opacity="0.25"/>
  <line x1="140" y1="80" x2="180" y2="60" stroke="#EFC14F" stroke-width="1" opacity="0.45"/>
  <line x1="140" y1="80" x2="180" y2="100" stroke="#EFC14F" stroke-width="1" opacity="0.45"/>
  <line x1="140" y1="110" x2="180" y2="60" stroke="#EFC14F" stroke-width="0.8" opacity="0.25"/>
  <line x1="140" y1="110" x2="180" y2="100" stroke="#EFC14F" stroke-width="1" opacity="0.4"/>

  <!-- Input layer nodes -->
  <circle cx="40" cy="40" r="7" fill="#0F172A" stroke="#4A6FA5" stroke-width="1.5"/>
  <circle cx="40" cy="80" r="7" fill="#0F172A" stroke="#4A6FA5" stroke-width="1.5"/>
  <circle cx="40" cy="120" r="7" fill="#0F172A" stroke="#4A6FA5" stroke-width="1.5"/>

  <!-- Hidden layer 1 nodes -->
  <circle cx="90" cy="35" r="7" fill="#0F172A" stroke="#EFC14F" stroke-width="1.5"/>
  <circle cx="90" cy="65" r="7" fill="#EFC14F" stroke="#EFC14F" stroke-width="1.5"/>
  <circle cx="90" cy="95" r="7" fill="#0F172A" stroke="#EFC14F" stroke-width="1.5"/>
  <circle cx="90" cy="125" r="7" fill="#0F172A" stroke="#EFC14F" stroke-width="1.5"/>

  <!-- Hidden layer 2 nodes -->
  <circle cx="140" cy="50" r="7" fill="#0F172A" stroke="#EFC14F" stroke-width="1.5"/>
  <circle cx="140" cy="80" r="7" fill="#EFC14F" stroke="#EFC14F" stroke-width="1.5"/>
  <circle cx="140" cy="110" r="7" fill="#0F172A" stroke="#EFC14F" stroke-width="1.5"/>

  <!-- Output layer nodes -->
  <circle cx="180" cy="60" r="8" fill="#EFC14F" stroke="#EFC14F" stroke-width="1.5"/>
  <circle cx="180" cy="100" r="8" fill="#0F172A" stroke="#EFC14F" stroke-width="2"/>
</svg>
