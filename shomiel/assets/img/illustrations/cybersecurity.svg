<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160">
  <title>Cybersecurity</title>

  <!-- Shield outer shape -->
  <path d="M100 18 L154 40 L154 90 Q154 130 100 148 Q46 130 46 90 L46 40 Z"
    fill="#0F172A" stroke="#1E3A5F" stroke-width="2.5"/>

  <!-- Shield inner fill -->
  <path d="M100 28 L146 48 L146 90 Q146 124 100 140 Q54 124 54 90 L54 48 Z"
    fill="#162034"/>

  <!-- Shield gold border accent -->
  <path d="M100 28 L146 48 L146 90 Q146 124 100 140 Q54 124 54 90 L54 48 Z"
    fill="none" stroke="#EFC14F" stroke-width="1.5" opacity="0.4"/>

  <!-- Lock body -->
  <rect x="84" y="86" width="32" height="28" rx="4" fill="#EFC14F"/>

  <!-- Lock shackle (arc) -->
  <path d="M90 86 L90 74 Q90 60 100 60 Q110 60 110 74 L110 86"
    fill="none" stroke="#EFC14F" stroke-width="5" stroke-linecap="round"/>

  <!-- Lock keyhole -->
  <circle cx="100" cy="98" r="5" fill="#0F172A"/>
  <rect x="97" y="98" width="6" height="9" rx="1" fill="#0F172A"/>

  <!-- Checkmark overlay (subtle, bottom-right of shield) -->
  <g transform="translate(118, 108)" opacity="0.8">
    <circle cx="0" cy="0" r="12" fill="#0F172A" stroke="#EFC14F" stroke-width="1.5"/>
    <polyline points="-5,0 -1,5 7,-5" fill="none" stroke="#EFC14F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Decorative dots on shield corners -->
  <circle cx="54" cy="48" r="3" fill="#EFC14F" opacity="0.5"/>
  <circle cx="146" cy="48" r="3" fill="#EFC14F" opacity="0.5"/>
</svg>
