<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160">
  <title>Data Engineering</title>

  <!-- Layer 3 (bottom cylinder) -->
  <ellipse cx="100" cy="128" rx="48" ry="12" fill="#162034" stroke="#1E3A5F" stroke-width="1.5"/>
  <rect x="52" y="104" width="96" height="24" fill="#162034"/>
  <rect x="52" y="104" width="96" height="24" fill="url(#cyl-side)"/>
  <ellipse cx="100" cy="104" rx="48" ry="12" fill="#1E3A5F" stroke="#2A4570" stroke-width="1.5"/>

  <!-- Layer 2 (middle cylinder) -->
  <ellipse cx="100" cy="96" rx="48" ry="12" fill="#162034" stroke="#1E3A5F" stroke-width="1.5"/>
  <rect x="52" y="72" width="96" height="24" fill="#162034"/>
  <ellipse cx="100" cy="72" rx="48" ry="12" fill="#243B55" stroke="#EFC14F" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Layer 1 (top cylinder) -->
  <ellipse cx="100" cy="64" rx="48" ry="12" fill="#162034" stroke="#1E3A5F" stroke-width="1.5"/>
  <rect x="52" y="40" width="96" height="24" fill="#162034"/>
  <ellipse cx="100" cy="40" rx="48" ry="12" fill="#2A4570" stroke="#EFC14F" stroke-width="1.5"/>

  <!-- Gold accent band on top cylinder side -->
  <rect x="52" y="46" width="96" height="3" fill="#EFC14F" opacity="0.3"/>

  <!-- Flow arrows between layers -->
  <g fill="#EFC14F" opacity="0.7">
    <!-- Arrow right side, layer 1 to 2 -->
    <polygon points="158,58 166,64 158,70" />
    <!-- Arrow right side, layer 2 to 3 -->
    <polygon points="158,88 166,96 158,104" />
  </g>

  <!-- Flow lines -->
  <line x1="162" y1="64" x2="162" y2="88" stroke="#EFC14F" stroke-width="1.5" opacity="0.5"/>

  <!-- Data dots on top face -->
  <circle cx="85" cy="40" r="2" fill="#EFC14F"/>
  <circle cx="100" cy="37" r="2" fill="#EFC14F" opacity="0.7"/>
  <circle cx="115" cy="40" r="2" fill="#EFC14F" opacity="0.5"/>

  <!-- Labels on cylinder sides -->
  <rect x="60" y="79" width="28" height="5" rx="2" fill="#EFC14F" opacity="0.2"/>
  <rect x="60" y="111" width="40" height="5" rx="2" fill="#1E3A5F"/>
</svg>
