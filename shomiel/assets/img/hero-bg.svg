<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 800" preserveAspectRatio="xMidYMid slice">
  <title>Hero Background</title>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0F1F3D" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EFC14F" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#EFC14F" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1440" height="800" fill="url(#bg-grad)"/>

  <!-- Fine grid -->
  <g stroke="#1E293B" stroke-width="0.5" opacity="0.7">
    <!-- Vertical lines every 80px -->
    <line x1="80" y1="0" x2="80" y2="800"/>
    <line x1="160" y1="0" x2="160" y2="800"/>
    <line x1="240" y1="0" x2="240" y2="800"/>
    <line x1="320" y1="0" x2="320" y2="800"/>
    <line x1="400" y1="0" x2="400" y2="800"/>
    <line x1="480" y1="0" x2="480" y2="800"/>
    <line x1="560" y1="0" x2="560" y2="800"/>
    <line x1="640" y1="0" x2="640" y2="800"/>
    <line x1="720" y1="0" x2="720" y2="800"/>
    <line x1="800" y1="0" x2="800" y2="800"/>
    <line x1="880" y1="0" x2="880" y2="800"/>
    <line x1="960" y1="0" x2="960" y2="800"/>
    <line x1="1040" y1="0" x2="1040" y2="800"/>
    <line x1="1120" y1="0" x2="1120" y2="800"/>
    <line x1="1200" y1="0" x2="1200" y2="800"/>
    <line x1="1280" y1="0" x2="1280" y2="800"/>
    <line x1="1360" y1="0" x2="1360" y2="800"/>
    <!-- Horizontal lines every 80px -->
    <line x1="0" y1="80" x2="1440" y2="80"/>
    <line x1="0" y1="160" x2="1440" y2="160"/>
    <line x1="0" y1="240" x2="1440" y2="240"/>
    <line x1="0" y1="320" x2="1440" y2="320"/>
    <line x1="0" y1="400" x2="1440" y2="400"/>
    <line x1="0" y1="480" x2="1440" y2="480"/>
    <line x1="0" y1="560" x2="1440" y2="560"/>
    <line x1="0" y1="640" x2="1440" y2="640"/>
    <line x1="0" y1="720" x2="1440" y2="720"/>
  </g>

  <!-- Diagonal architectural lines -->
  <g stroke="#EFC14F" stroke-width="1" opacity="0.06">
    <line x1="600" y1="0" x2="1440" y2="600"/>
    <line x1="700" y1="0" x2="1440" y2="520"/>
    <line x1="1440" y1="0" x2="400" y2="800"/>
    <line x1="1200" y1="0" x2="0" y2="600"/>
  </g>

  <!-- Large geometric shapes -->
  <!-- Top-right triangle -->
  <polygon points="1100,0 1440,0 1440,320" fill="#EFC14F" opacity="0.03"/>
  <!-- Bottom-left triangle -->
  <polygon points="0,550 0,800 280,800" fill="#EFC14F" opacity="0.03"/>

  <!-- Concentric rings (top right) -->
  <circle cx="1200" cy="150" r="250" fill="none" stroke="#EFC14F" stroke-width="1" opacity="0.08"/>
  <circle cx="1200" cy="150" r="180" fill="none" stroke="#EFC14F" stroke-width="1" opacity="0.07"/>
  <circle cx="1200" cy="150" r="110" fill="none" stroke="#EFC14F" stroke-width="1" opacity="0.06"/>
  <circle cx="1200" cy="150" r="50" fill="none" stroke="#EFC14F" stroke-width="1.5" opacity="0.1"/>

  <!-- Glow blob center-right -->
  <ellipse cx="1100" cy="400" rx="400" ry="300" fill="url(#glow)"/>

  <!-- Corner accent marks -->
  <path d="M40 40h20v4H44v16h-4V40z" fill="#EFC14F" opacity="0.3"/>
  <path d="M1400 40h-20v4h16v16h4V40z" fill="#EFC14F" opacity="0.3"/>
  <path d="M40 760h20v-4H44v-16h-4V760z" fill="#EFC14F" opacity="0.3"/>
  <path d="M1400 760h-20v-4h16v-16h4V760z" fill="#EFC14F" opacity="0.3"/>

  <!-- Bottom fade -->
  <defs>
    <linearGradient id="bottom-fade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0.8"/>
    </linearGradient>
  </defs>
  <rect y="500" width="1440" height="300" fill="url(#bottom-fade)"/>
</svg>
